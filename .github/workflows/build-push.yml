name: build-push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-1
  AWS_ACCOUNT_ID: '527055790396'
  ECR_REGISTRY: 527055790396.dkr.ecr.ap-southeast-1.amazonaws.com
  IAM_ROLE_ARN: arn:aws:iam::527055790396:role/shopxpress-gha-ecr-push

jobs:
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway:
              - 'services/gateway/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'
            products:
              - 'services/products/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'
            orders:
              - 'services/orders/**'
              - 'pkg/**'
              - 'go.mod'
              - 'go.sum'

      - id: set
        name: Build dynamic service list
        run: |
          services="[]"
          [[ "${{ steps.filter.outputs.gateway }}"  == "true" ]] && services=$(jq -nc --argjson s "$services" '$s + ["gateway"]')
          [[ "${{ steps.filter.outputs.products }}" == "true" ]] && services=$(jq -nc --argjson s "$services" '$s + ["products"]')
          [[ "${{ steps.filter.outputs.orders }}"   == "true" ]] && services=$(jq -nc --argjson s "$services" '$s + ["orders"]')
          echo "services=$services" >> "$GITHUB_OUTPUT"
          echo "Services to build: $services"

  build:
    name: Build & push ${{ matrix.service }}
    needs: detect
    if: needs.detect.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.services) }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}-${{ matrix.service }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.ECR_REGISTRY }}/shopxpress-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:sha-${{ steps.tag.outputs.short_sha }}
            ${{ steps.tag.outputs.image }}:dev
          provenance: false
          build-args: |
            SERVICE=${{ matrix.service }}
            VERSION=sha-${{ steps.tag.outputs.short_sha }}

      - name: Summary
        run: |
          echo "### Pushed shopxpress-${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`sha-${{ steps.tag.outputs.short_sha }}\` + \`dev\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Registry: ${{ env.ECR_REGISTRY }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  bump-dev-tag:
    name: Bump dev tag in shopxpress-deploy (${{ matrix.service }})
    needs: [detect, build]
    if: needs.detect.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.services) }}
    steps:
      - name: Setup SSH agent with deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_REPO_SSH_KEY }}

      - name: Trust github.com host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone shopxpress-deploy
        run: git clone git@github.com:DVM1987/shopxpress-deploy.git /tmp/deploy

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Compute new tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "new_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Update image tag in values-dev.yaml
        working-directory: /tmp/deploy
        run: |
          FILE="services/${{ matrix.service }}/values-dev.yaml"
          OLD_TAG=$(yq '.image.tag' "$FILE")
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          echo "Service: ${{ matrix.service }} | Old: $OLD_TAG | New: $NEW_TAG"
          if [ "$OLD_TAG" = "$NEW_TAG" ]; then
            echo "Tag already $NEW_TAG, skipping"
            echo "skip=true" >> "$GITHUB_ENV"
          else
            yq -i ".image.tag = \"$NEW_TAG\"" "$FILE"
            echo "skip=false" >> "$GITHUB_ENV"
          fi

      - name: Commit and push
        if: env.skip == 'false'
        working-directory: /tmp/deploy
        run: |
          git config user.email "shopxpress-bot@noreply.github.com"
          git config user.name "shopxpress-deploy-bot"
          git add services/${{ matrix.service }}/values-dev.yaml
          git commit -m "bot: bump ${{ matrix.service }} dev tag to ${{ steps.tag.outputs.new_tag }} [skip ci]

Source repo: ${{ github.repository }}
Source commit: ${{ github.sha }}
Workflow: ${{ github.workflow }} run ${{ github.run_id }}"
          git push origin main

      - name: Summary
        run: |
          echo "### Bumped ${{ matrix.service }} dev tag" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- New tag: \`${{ steps.tag.outputs.new_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skipped: \`$skip\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Manifest repo: \`DVM1987/shopxpress-deploy\` (path \`services/${{ matrix.service }}/values-dev.yaml\`)" >> "$GITHUB_STEP_SUMMARY"
